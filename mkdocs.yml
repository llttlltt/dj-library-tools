site_name: DJ Library Tools
site_description: DJ library management across multiple providers.
repo_url: https://github.com/llttlltt/dj-library-tools
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - navigation.breadcrumbs
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

extra:
  generator: false

nav:
  - Home: index.md
  - Guide:
    - index: guide/index.md
    - Getting Started: guide/getting-started.md
    - Configuration: guide/configuration.md
    - Commands Overview: guide/commands.md
  - Query:
    - Syntax: query/syntax.md
    - Providers:
      - index: providers/index.md
      - Rekordbox: providers/rekordbox.md
      - Plex: providers/plex.md
      - M3U: providers/m3u.md
  - Workflows:
    - index: workflows/index.md
    - Creating and Updating Playlists: workflows/creating-and-updating-playlists.md
    - Exporting to Mobile: workflows/exporting-to-mobile.md
    - Cleaning Up: workflows/cleaning-up.md
    - Library Repair: workflows/library-repair.md
    - Metadata Hardening: workflows/metadata-hardening.md
    - Metadata Reconciliation: workflows/metadata-reconciliation.md
    - Organizing by Complexity: workflows/organizing-by-complexity.md
    - Organizing Resources: workflows/organizing-resources.md
  - Commands Reference:
    - index: commands/index.md
    - ls: commands/ls.md
    - sync: commands/sync.md
    - edit: commands/edit.md
    - fix: commands/fix.md
    - mk: commands/mk.md
    - mv: commands/mv.md
    - rm: commands/rm.md
    - config:
      - index: commands/config/index.md
      - connection:
        - index: commands/config/connection/index.md
        - list: commands/config/connection/list.md
