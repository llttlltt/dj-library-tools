site_name: DJ Library Tools
site_description: DJ library management and Rekordbox XML manipulation.
repo_url: https://github.com/llttlltt/dj-library-tools
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - navigation.breadcrumbs
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

extra:
  generator: false

nav:
  - Guide:
    - Getting Started: guide/getting-started.md
    - Configuration: guide/configuration.md
    - Syntax: guide/syntax.md
    - Providers:
      - guide/query/providers/index.md
      - Rekordbox:
        - guide/query/providers/rekordbox/index.md
        - Examples: guide/query/providers/rekordbox/examples.md
      - Plex:
        - guide/query/providers/plex/index.md
        - Examples: guide/query/providers/plex/examples.md
    - Workflows:
      - guide/workflows/index.md
      - Automating Playlists: guide/workflows/automating-playlists.md
    - Commands:
      - guide/commands/index.md
      - CLI Reference:
        - commands/index.md
        - add: commands/add.md
        - remove: commands/remove.md
        - sync: commands/sync.md
        - move: commands/move.md
        - rename: commands/rename.md
        - create: commands/create.md
        - delete: commands/delete.md
        - update: commands/update.md
        - stat: commands/stat.md
        - auth: commands/auth.md
        - config: commands/config.md
        - fix: 
          - commands/fix/index.md
          - playlist: commands/fix/playlist.md
  - Development:
    - Architecture: development/architecture.md
