site_name: DJ Library Tools
site_description: DJ library management across multiple providers.
repo_url: https://github.com/llttlltt/dj-library-tools
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - navigation.breadcrumbs
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

extra:
  generator: false

nav:
  - Guide:
    - Getting Started: guide/getting-started.md
    - Configuration: guide/configuration.md
    - Syntax: guide/syntax.md
    - Providers:
      - Overview: guide/query/providers/index.md
      - Rekordbox: guide/query/providers/rekordbox/index.md
      - Plex: guide/query/providers/plex/index.md
      - M3U: guide/query/providers/m3u/index.md
    - Workflows:
      - index: guide/workflows/index.md
      - Creating and Updating Playlists: guide/workflows/creating-and-updating-playlists.md
      - Exporting to Mobile: guide/workflows/exporting-to-mobile.md
      - Cleaning Up: guide/workflows/cleaning-up.md
      - Library Repair: guide/workflows/library-repair.md
      - Metadata Hardening: guide/workflows/metadata-hardening.md
      - Metadata Reconciliation: guide/workflows/metadata-reconciliation.md
      - Organizing by Complexity: guide/workflows/organizing-by-complexity.md
      - Organizing Resources: guide/workflows/organizing-resources.md
    - Commands:
      - index: guide/commands/index.md
      - Reference:
        - index: commands/index.md
        - ls: commands/ls.md
        - sync: commands/sync.md
        - edit: commands/edit.md
        - mk: commands/mk.md
        - mv: commands/mv.md
        - rm: commands/rm.md
        - config: commands/config/index.md
        - list: commands/config/list.md
        - plex: commands/config/plex/index.md
        - rb: commands/config/rb/index.md
  - Development:
    - Architecture: development/architecture.md
